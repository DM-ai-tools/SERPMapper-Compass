# Supabase project config
# Update project_id after running: supabase init

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://serpmap.com.au"]
jwt_expiry = 3600

[edge_runtime]
enabled = true

[functions.poll-dataforseo]
verify_jwt = false
